services:
  - type: web
    name: blackpink-deadline
    runtime: static
    buildCommand: ""
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=3600
      - path: /audio/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /video.mp4
        name: Cache-Control
        value: public, max-age=31536000, immutable
